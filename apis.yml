apis:
  - aid: apify:apify-api
    name: Apify API
    description: >-
      The Apify REST API (v2) provides programmatic access to the Apify
      platform, allowing you to manage actors, run scraping tasks, access
      datasets, key-value stores, and request queues. All requests and
      responses are encoded in JSON with UTF-8 encoding. Client libraries
      are available for Node.js (apify-client) and Python (apify-client).
    humanURL: https://apify.com
    baseURL: https://api.apify.com/v2
