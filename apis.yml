aid: apify
name: Apify
description: >-
  Apify is a full-stack web scraping and browser automation platform that
  enables developers to build, run, and scale web scrapers, crawlers, and
  data extraction tools using a cloud-based infrastructure with built-in
  proxy management, scheduling, and storage. The platform hosts thousands
  of ready-made Actors for scraping social media, search engines, maps,
  e-commerce sites, and more.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Actors
  - Browser Automation
  - Crawling
  - Data Aggregation
  - Data Extraction
  - Web Automation
  - Web Scraping
url: >-
  https://raw.githubusercontent.com/api-evangelist/apify/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: apify:apify-api
    name: Apify API
    description: >-
      The Apify REST API (v2) provides programmatic access to the Apify
      platform, allowing you to manage actors, run scraping tasks, access
      datasets, key-value stores, and request queues. Authentication uses
      Bearer tokens. Rate limits: 250,000 requests/minute globally, 60-400
      requests/second per resource.
    humanURL: https://apify.com
    baseURL: https://api.apify.com/v2
    tags:
      - Actors
      - Automation
      - Crawling
      - Data Extraction
      - Datasets
      - Web Scraping
    properties:
      - type: Documentation
        url: https://docs.apify.com/api/v2
      - type: OpenAPI
        url: openapi/apify-api.yaml
      - type: GettingStarted
        url: https://docs.apify.com/api/v2/getting-started
      - type: Authentication
        url: https://docs.apify.com/api/v2#authentication
      - type: RateLimits
        url: https://docs.apify.com/api/v2#rate-limiting-and-scaling
